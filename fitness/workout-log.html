<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Rohit — Workout Log</title>
<link rel="stylesheet" href="/fitness/css/theme.css">
<script>
window.HEADER_CONFIG = {
  title: 'Workout Log',
  backLink: '/fitness/index.html',
  backLabel: '← Tracker',
  nextLink: '/fitness/plan.html',
  nextLabel: 'Plan →',
  tag: 'Lean Bulk · Workout Log',
  sub: 'PPL×2 Split · Mon–Sat'
};
</script>
<style>
/* ── WEEK SELECTOR ── */
.week-selector {
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 12px;
  padding: 20px 20px 8px;
}
.week-btn {
  width: 36px; height: 36px;
  border: none; border-radius: 50%;
  background: var(--glass);
  backdrop-filter: blur(10px);
  border: 1px solid var(--glass-border);
  cursor: pointer;
  font-size: 18px;
  color: var(--sky);
  display: flex; align-items: center; justify-content: center;
  box-shadow: var(--shadow-sm);
  transition: all 0.2s;
}
.week-btn:active { transform: scale(0.9); }
.week-label {
  font-family: var(--font-mono);
  font-size: 14px; font-weight: 700;
  color: var(--navy);
  min-width: 130px; text-align: center;
}

/* ── STATS BAR ── */
.stats-bar {
  display: grid;
  grid-template-columns: repeat(3,1fr);
  gap: 10px;
  padding: 0 20px 16px;
}
.stat-card {
  background: var(--glass);
  backdrop-filter: blur(10px);
  border-radius: var(--r-lg);
  padding: 14px 10px;
  border: 1px solid var(--glass-border);
  text-align: center;
}
.stat-num {
  font-family: var(--font-mono);
  font-size: 20px; font-weight: 700;
  color: var(--navy);
}
.stat-label { font-size: 10px; color: rgba(26,58,82,0.5); text-transform: uppercase; letter-spacing: 0.5px; margin-top: 3px; }

/* ── DAY STRIP ── */
.day-strip {
  display: flex; gap: 8px;
  padding: 0 20px 12px;
  overflow-x: auto; scrollbar-width: none;
}
.day-strip::-webkit-scrollbar { display: none; }
.day-pill {
  flex-shrink: 0;
  padding: 8px 14px; border-radius: 20px;
  font-family: var(--font-mono);
  font-size: 11px; font-weight: 700;
  cursor: pointer; transition: all 0.2s;
  border: 1.5px solid transparent;
  background: var(--glass); backdrop-filter: blur(10px);
  color: var(--navy); border-color: rgba(255,255,255,0.8);
}
.day-pill.active-push { background: rgba(249,115,22,0.15); border-color: var(--push); color: var(--push); }
.day-pill.active-pull { background: rgba(56,171,228,0.15); border-color: var(--pull); color: var(--pull); }
.day-pill.active-legs { background: rgba(34,197,94,0.15); border-color: var(--legs); color: var(--legs); }
.day-pill.active-rest { background: rgba(167,139,250,0.15); border-color: var(--rest); color: var(--rest); }
.day-pill.rest-day { opacity: 0.5; }

/* ── CAROUSEL ── */
.carousel-wrap { padding: 0 0 8px; overflow: hidden; }
.carousel {
  display: flex; gap: 16px; padding: 0 20px;
  overflow-x: scroll; scroll-snap-type: x mandatory;
  -webkit-overflow-scrolling: touch;
  scrollbar-width: none; cursor: grab;
}
.carousel::-webkit-scrollbar { display: none; }
.carousel:active { cursor: grabbing; }

/* ── SESSION CARD ── */
.session-card {
  flex-shrink: 0;
  width: calc(100vw - 40px);
  scroll-snap-align: start;
  background: var(--glass); backdrop-filter: blur(20px);
  border-radius: var(--r-xl);
  border: 1px solid var(--glass-border);
  box-shadow: var(--shadow-lg); overflow: hidden;
}
.card-header {
  padding: 18px 20px 14px;
  display: flex; align-items: center; justify-content: space-between;
  border-bottom: 1px solid rgba(56,171,228,0.1);
}
.card-date { font-family: var(--font-mono); font-size: 12px; color: rgba(26,58,82,0.5); }
.card-title {
  padding: 14px 20px 12px;
  font-family: var(--font-mono); font-size: 18px; font-weight: 700;
  color: var(--navy); line-height: 1.2;
}

/* ── EXERCISES ── */
.exercises { padding: 0 16px 20px; display: flex; flex-direction: column; gap: 8px; }
.exercise-row {
  background: rgba(255,255,255,0.5); border-radius: 14px;
  padding: 12px 14px; display: grid;
  grid-template-columns: 1fr auto; gap: 8px; align-items: center;
  border: 1px solid rgba(255,255,255,0.8);
}
.ex-name { font-size: 14px; font-weight: 600; color: var(--navy); line-height: 1.3; }
.ex-muscle { font-size: 10px; color: rgba(26,58,82,0.45); margin-top: 2px; }
.ex-numbers { text-align: right; }
.ex-weight { font-family: var(--font-mono); font-size: 20px; font-weight: 700; color: var(--sky); line-height: 1; }
.ex-reps { font-family: var(--font-mono); font-size: 11px; color: rgba(26,58,82,0.5); margin-top: 2px; }
.ex-sets { display: flex; flex-direction: column; gap: 3px; align-items: flex-end; }
.set-chip {
  font-family: var(--font-mono); font-size: 11px; font-weight: 700;
  background: rgba(56,171,228,0.1); color: var(--sky);
  padding: 3px 8px; border-radius: 8px;
}
.set-chip.push { background: rgba(249,115,22,0.1); color: var(--push); }
.set-chip.legs { background: rgba(34,197,94,0.1); color: var(--legs); }

/* ── REST / EMPTY ── */
.rest-body, .empty-body { padding: 40px 20px; text-align: center; }
.rest-icon, .empty-icon { font-size: 44px; margin-bottom: 12px; }
.rest-title, .empty-title { font-family: var(--font-mono); font-size: 18px; font-weight: 700; color: var(--navy); margin-bottom: 8px; }
.rest-sub, .empty-sub { font-size: 13px; color: rgba(26,58,82,0.5); }

/* ── DOTS ── */
.dots { display: flex; justify-content: center; gap: 6px; padding: 10px 0 20px; }
.dot { width: 6px; height: 6px; border-radius: 50%; background: rgba(56,171,228,0.25); transition: all 0.3s; cursor: pointer; }
.dot.active { width: 20px; border-radius: 4px; background: var(--sky); }
</style>
</head>
<body>

<div id="app-header"></div>

<div class="week-selector">
  <button class="week-btn" onclick="changeWeek(-1)">‹</button>
  <div class="week-label" id="weekLabel">Loading...</div>
  <button class="week-btn" onclick="changeWeek(1)">›</button>
</div>

<div class="stats-bar" id="statsBar"></div>
<div class="day-strip" id="dayStrip"></div>

<div class="carousel-wrap">
  <div class="carousel" id="carousel"></div>
</div>
<div class="dots" id="dots"></div>

<div class="footer">ROHIT · LEAN BULK · PPL×2 SPLIT</div>

<script src="/fitness/components/header.js"></script>
<script>
let WEEKS = [];
let cW = 0, cS = 0;

async function loadData() {
  try {
    const r = await fetch('/fitness/data/workout.json?v=' + Date.now());
    if(!r.ok) throw new Error('workout.json not found');
    const data = await r.json();
    WEEKS = data.weeks || [];
    if(!WEEKS.length) throw new Error('No weeks in data');
    // Start on most recent week
    cW = WEEKS.length - 1;
    // Find most recent logged session
    const w = WEEKS[cW];
    cS = 0;
    for(let i=w.sessions.length-1;i>=0;i--) {
      if(w.sessions[i].exercises) { cS=i; break; }
    }
    render();
  } catch(e) {
    document.getElementById('carousel').innerHTML =
      `<div class="session-card"><div class="empty-body"><div class="empty-icon">⚠️</div><div class="empty-title">Could not load</div><div class="empty-sub">${e.message}</div></div></div>`;
  }
}

function getBadge(t) { return {push:'badge-push',pull:'badge-pull',legs:'badge-legs',rest:'badge-rest'}[t]||'badge-pull'; }
function getChip(t)  { return {push:'set-chip push',legs:'set-chip legs'}[t]||'set-chip'; }
function pillClass(t,active) {
  if(!active) return t==='rest'?'day-pill rest-day':'day-pill';
  return 'day-pill active-'+t;
}

function renderStats() {
  const w = WEEKS[cW];
  const logged = w.sessions.filter(s=>s.type!=='rest'&&s.exercises).length;
  const total = w.sessions.filter(s=>s.type!=='rest').length;
  const exCount = w.sessions.reduce((a,s)=>a+(s.exercises?.length||0),0);
  document.getElementById('statsBar').innerHTML = `
    <div class="stat-card"><div class="stat-num">${logged}/${total}</div><div class="stat-label">Logged</div></div>
    <div class="stat-card"><div class="stat-num">${exCount}</div><div class="stat-label">Exercises</div></div>
    <div class="stat-card"><div class="stat-num">${w.dates?.split('–')[0]||'—'}</div><div class="stat-label">Week start</div></div>`;
}

function renderStrip() {
  const w = WEEKS[cW];
  document.getElementById('dayStrip').innerHTML = w.sessions.map((s,i) =>
    `<div class="${pillClass(s.type,i===cS)}" onclick="goTo(${i})">${s.day}</div>`
  ).join('');
}

function renderCards() {
  const w = WEEKS[cW];
  const carousel = document.getElementById('carousel');
  const dots = document.getElementById('dots');

  carousel.innerHTML = w.sessions.map((s,i) => {
    const header = `<div class="card-header">
      <span class="badge ${getBadge(s.type)}">${s.type.toUpperCase()}</span>
      <span class="card-date">${s.date}</span>
    </div>`;

    if(s.type==='rest') return `<div class="session-card">${header}
      <div class="rest-body"><div class="rest-icon">🛌</div><div class="rest-title">Rest Day</div>
      <div class="rest-sub">Walk, stretch, recover.<br>Muscle is built here.</div></div></div>`;

    if(!s.exercises) return `<div class="session-card">${header}
      <div class="card-title">${s.label}</div>
      <div class="empty-body"><div class="empty-icon">⏳</div><div class="empty-title">Not logged yet</div>
      <div class="empty-sub">Log after your session.</div></div></div>`;

    const exHTML = s.exercises.map(ex => {
      const single = ex.sets.length === 1;
      const nums = single
        ? `<div class="ex-weight">${ex.sets[0].w}</div><div class="ex-reps">${ex.sets[0].r}</div>`
        : `<div class="ex-sets">${ex.sets.map(st=>`<div class="${getChip(s.type)}">${st.w} · ${st.r}</div>`).join('')}</div>`;
      return `<div class="exercise-row">
        <div><div class="ex-name">${ex.name}</div><div class="ex-muscle">${ex.muscle}</div></div>
        <div class="ex-numbers">${nums}</div>
      </div>`;
    }).join('');

    return `<div class="session-card">${header}
      <div class="card-title">${s.label}</div>
      <div class="exercises">${exHTML}</div></div>`;
  }).join('');

  dots.innerHTML = w.sessions.map((_,i) =>
    `<div class="dot ${i===cS?'active':''}" onclick="goTo(${i})"></div>`
  ).join('');

  const cardW = window.innerWidth - 40 + 16;
  carousel.scrollLeft = cS * cardW;

  carousel.onscroll = () => {
    const idx = Math.round(carousel.scrollLeft / cardW);
    if(idx !== cS) { cS=idx; renderStrip(); updateDots(); }
  };
}

function updateDots() {
  document.querySelectorAll('.dot').forEach((d,i) => d.classList.toggle('active', i===cS));
}

function goTo(idx) {
  cS = idx;
  const cardW = window.innerWidth - 40 + 16;
  document.getElementById('carousel').scrollTo({left: idx*cardW, behavior:'smooth'});
  renderStrip(); updateDots();
}

function changeWeek(dir) {
  const n = cW + dir;
  if(n<0||n>=WEEKS.length) return;
  cW = n; cS = 0;
  const w = WEEKS[cW];
  for(let i=0;i<w.sessions.length;i++) { if(w.sessions[i].type!=='rest'){cS=i;break;} }
  document.getElementById('weekLabel').textContent = w.label;
  render();
}

function render() {
  document.getElementById('weekLabel').textContent = WEEKS[cW]?.label || '—';
  renderStats(); renderStrip(); renderCards();
}

loadData();
</script>
</body>
</html>
