<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Rohit — Lean Bulk Tracker</title>
<link rel="stylesheet" href="/fitness/css/theme.css">
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
<script>
window.HEADER_CONFIG = {
  title: 'Progress Tracker',
  backLink: '/fitness/plan.html',
  backLabel: '← Plan',
  nextLink: '/fitness/workout-log.html',
  nextLabel: 'Workout Log →',
  tag: 'Lean Bulk · Progress Tracker',
  sub: 'PPL×2 Split · Indian Diet'
};
</script>
<style>
/* ── MACRO TARGETS ── */
.macros-row {
  display: grid; grid-template-columns: repeat(4,1fr);
  gap: 8px; padding: 0 20px 16px;
}
.macro-card {
  background: var(--glass); backdrop-filter: blur(10px);
  border-radius: var(--r-md); padding: 12px 8px;
  border: 1px solid var(--glass-border); text-align: center;
}
.macro-val { font-family: var(--font-mono); font-size: 17px; font-weight: 700; color: var(--sky); }
.macro-label { font-size: 10px; color: rgba(26,58,82,0.5); margin-top: 2px; }

/* ── TODAY CARD ── */
.today-card {
  margin: 0 20px 16px;
  background: var(--glass); backdrop-filter: blur(16px);
  border-radius: var(--r-xl); border: 1px solid var(--glass-border);
  box-shadow: var(--shadow-md); overflow: hidden;
}
.today-header {
  padding: 14px 18px 12px;
  border-bottom: 1px solid rgba(56,171,228,0.1);
  display: flex; align-items: center; justify-content: space-between;
}
.today-date { font-family: var(--font-mono); font-size: 11px; font-weight: 700; color: var(--sky); text-transform: uppercase; letter-spacing: 1px; }
.today-body { padding: 14px 18px; }
.macro-bar-row { margin-bottom: 12px; }
.macro-bar-row:last-child { margin-bottom: 0; }
.macro-bar-top { display: flex; justify-content: space-between; margin-bottom: 4px; }
.macro-bar-label { font-size: 12px; color: rgba(26,58,82,0.55); }
.macro-bar-val { font-family: var(--font-mono); font-size: 12px; font-weight: 700; color: var(--navy); }
.pbar { height: 7px; background: rgba(56,171,228,0.1); border-radius: 4px; overflow: hidden; }
.pbar-fill { height: 100%; border-radius: 4px; transition: width 0.7s var(--ease); }
.fill-green  { background: linear-gradient(90deg, #22c55e, #16a34a); }
.fill-blue   { background: linear-gradient(90deg, #38abe4, #7da4e8); }
.fill-orange { background: linear-gradient(90deg, #f97316, #fb923c); }
.fill-red    { background: linear-gradient(90deg, #ef4444, #f87171); }

/* ── SLEEP MINI ── */
.sleep-mini { display: grid; grid-template-columns: repeat(4,1fr); gap: 6px; margin-top: 14px; padding-top: 12px; border-top: 1px solid rgba(56,171,228,0.08); }
.sleep-mini-item { text-align: center; }
.sleep-mini-val { font-family: var(--font-mono); font-size: 13px; font-weight: 700; color: var(--navy); }
.sleep-mini-label { font-size: 9px; color: rgba(26,58,82,0.4); margin-top: 1px; }

/* ── CHART SECTION ── */
.chart-section { padding: 0 20px 16px; }
.chart-card {
  background: var(--glass); backdrop-filter: blur(10px);
  border-radius: var(--r-xl); border: 1px solid var(--glass-border);
  padding: 16px; margin-bottom: 12px; box-shadow: var(--shadow-sm);
}
.chart-title {
  font-family: var(--font-mono); font-size: 11px; font-weight: 700;
  color: var(--sky); text-transform: uppercase; letter-spacing: 1px;
  margin-bottom: 14px;
}
.chart-wrap { position: relative; height: 160px; }

/* ── WEEK AVG ── */
.avg-row { display: flex; justify-content: space-between; align-items: center; padding: 9px 0; border-bottom: 1px solid rgba(56,171,228,0.08); }
.avg-row:last-child { border-bottom: none; }
.avg-label { font-size: 12px; color: rgba(26,58,82,0.55); }
.avg-val { font-family: var(--font-mono); font-size: 13px; font-weight: 700; color: var(--navy); }

/* ── SCORE BADGE ── */
.score-badge { font-family: var(--font-mono); font-size: 11px; font-weight: 700; padding: 3px 8px; border-radius: 10px; }
.score-great { background: rgba(34,197,94,0.12); color: #22c55e; }
.score-good  { background: rgba(56,171,228,0.12); color: var(--sky); }
.score-ok    { background: rgba(249,115,22,0.12); color: var(--push); }
.score-low   { background: rgba(239,68,68,0.12); color: #ef4444; }

/* ── LOG LIST ── */
.log-item {
  background: var(--glass); backdrop-filter: blur(10px);
  border-radius: var(--r-lg); padding: 14px 16px;
  margin-bottom: 8px; border: 1px solid var(--glass-border);
}
.log-item-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 8px; }
.log-macro-grid { display: grid; grid-template-columns: repeat(4,1fr); gap: 6px; }
.log-macro { text-align: center; background: rgba(56,171,228,0.06); border-radius: 8px; padding: 6px 4px; }
.log-macro-val { font-family: var(--font-mono); font-size: 13px; font-weight: 700; }
.log-macro-label { font-size: 9px; color: rgba(26,58,82,0.4); }

.in-progress { font-family: var(--font-mono); font-size: 12px; color: rgba(26,58,82,0.4); padding: 8px 0; text-align: center; }
</style>
</head>
<body>

<div id="app-header"></div>

<div class="tab-bar">
  <button class="tab active" onclick="showTab('macros',this)">Macros</button>
  <button class="tab" onclick="showTab('sleep',this)">Sleep</button>
  <button class="tab" onclick="showTab('weight',this)">Weight</button>
  <button class="tab" onclick="showTab('log',this)">Log</button>
</div>

<div id="tab-macros"></div>
<div id="tab-sleep" style="display:none"></div>
<div id="tab-weight" style="display:none"></div>
<div id="tab-log" style="display:none"></div>

<div class="footer" id="footer">ROHIT · LEAN BULK · PPL×2 SPLIT</div>

<script src="/fitness/components/header.js"></script>
<script>
let DATA = null;
const charts = {};

// ── CHART.JS DEFAULTS ─────────────────────────────────────────────
Chart.defaults.font.family = "'DM Mono', monospace";
Chart.defaults.color = 'rgba(26,58,82,0.45)';

// ── LOAD ──────────────────────────────────────────────────────────
async function loadData() {
  try {
    const r = await fetch('/fitness/data/log.json?v=' + Date.now());
    if(!r.ok) throw new Error('log.json not found');
    DATA = await r.json();
    render();
  } catch(e) {
    document.getElementById('tab-macros').innerHTML =
      `<div style="padding:40px 20px;text-align:center;font-family:var(--font-mono);color:var(--sky)">⚠️ ${e.message}</div>`;
  }
}

// ── HELPERS ───────────────────────────────────────────────────────
function pct(v,t){ return Math.min(100,Math.round((v||0)/t*100)); }
function scoreClass(s){ return s>=90?'score-great':s>=80?'score-good':s>=70?'score-ok':'score-low'; }
function dotColor(v,t){ if(v===null)return'#ccc'; const r=v/t; return r>=0.9?'#22c55e':r>=0.75?'#f97316':'#ef4444'; }
function avg(arr){ const f=arr.filter(v=>v!=null); return f.length?f.reduce((a,b)=>a+b,0)/f.length:null; }
function shortLabel(d){ return d.label?.split(',')[0]||d.date?.slice(5)||''; }

function destroyChart(id){ if(charts[id]){ charts[id].destroy(); delete charts[id]; } }

// ── CHART BUILDERS ────────────────────────────────────────────────

function makeLineChart(canvasId, labels, datasets, opts={}) {
  destroyChart(canvasId);
  const ctx = document.getElementById(canvasId)?.getContext('2d');
  if(!ctx) return;

  charts[canvasId] = new Chart(ctx, {
    type: 'line',
    data: { labels, datasets },
    options: {
      responsive: true,
      maintainAspectRatio: false,
      interaction: { mode: 'index', intersect: false },
      plugins: {
        legend: {
          display: datasets.length > 1,
          position: 'top',
          labels: { boxWidth: 10, padding: 8, font: { size: 10 } }
        },
        tooltip: {
          callbacks: {
            label: ctx => ` ${ctx.dataset.label}: ${ctx.parsed.y != null ? ctx.parsed.y + (opts.unit||'') : '—'}`
          }
        }
      },
      scales: {
        x: {
          grid: { color: 'rgba(56,171,228,0.06)' },
          ticks: { font: { size: 9 }, maxRotation: 0, maxTicksLimit: 7 }
        },
        y: {
          min: opts.yMin,
          max: opts.yMax,
          grid: { color: 'rgba(56,171,228,0.08)' },
          ticks: { font: { size: 9 }, maxTicksLimit: 5,
            callback: v => v + (opts.unit||'')
          }
        },
        ...(opts.y2 ? {
          y2: {
            position: 'right',
            min: opts.y2Min, max: opts.y2Max,
            grid: { drawOnChartArea: false },
            ticks: { font: { size: 9 }, maxTicksLimit: 4, callback: v => v + (opts.y2unit||'') }
          }
        } : {})
      },
      ...( opts.annotations ? { plugins: { annotation: opts.annotations } } : {} )
    }
  });
}

function targetLine(value, color='rgba(56,171,228,0.5)') {
  return {
    type: 'line',
    yMin: value, yMax: value,
    borderColor: color,
    borderWidth: 1.5,
    borderDash: [5,5],
    label: { display: false }
  };
}

// ── TAB: MACROS ───────────────────────────────────────────────────
function renderMacros() {
  const T = DATA.targets;
  const days = DATA.days;
  const last = [...days].reverse().find(d=>d.calories!==null) || days[days.length-1];
  const w7 = days.slice(-7);

  let html = `
  <div class="section"><div class="section-label">Daily Targets</div></div>
  <div class="macros-row">
    <div class="macro-card"><div class="macro-val">${T.calories}</div><div class="macro-label">kcal</div></div>
    <div class="macro-card"><div class="macro-val">${T.protein}g</div><div class="macro-label">protein</div></div>
    <div class="macro-card"><div class="macro-val">${T.carbs}g</div><div class="macro-label">carbs</div></div>
    <div class="macro-card"><div class="macro-val">${T.fat}g</div><div class="macro-label">fat</div></div>
  </div>

  <div class="section"><div class="section-label">Day ${last.day} — ${last.label||last.date}</div></div>
  <div class="today-card">
    <div class="today-header">
      <span class="today-date">${last.workout||'—'}</span>
      ${last.weight?`<span style="font-family:var(--font-mono);font-size:14px;font-weight:700;color:var(--navy)">${last.weight} kg</span>`:''}
    </div>
    <div class="today-body">`;

  if(last.calories===null) {
    html += `<div class="in-progress">⏳ Logging in progress...</div>`;
  } else {
    const bars = [
      {l:'Calories',v:last.calories,t:T.calories,u:'kcal'},
      {l:'Protein', v:last.protein, t:T.protein, u:'g'},
      {l:'Carbs',   v:last.carbs,   t:T.carbs,   u:'g'},
      {l:'Fat',     v:last.fat,     t:T.fat,      u:'g'},
    ];
    bars.forEach(b => {
      const p = pct(b.v, b.t);
      const cls = p>=90?'fill-green':p>=75?'fill-orange':'fill-red';
      html += `<div class="macro-bar-row">
        <div class="macro-bar-top">
          <span class="macro-bar-label">${b.l}</span>
          <span class="macro-bar-val">${b.v}${b.u} <span style="font-size:10px;opacity:0.4">/ ${b.t}${b.u}</span></span>
        </div>
        <div class="pbar"><div class="pbar-fill ${cls}" style="width:${p}%"></div></div>
      </div>`;
    });
  }

  if(last.sleep) {
    const s = last.sleep;
    html += `<div class="sleep-mini">
      <div class="sleep-mini-item"><div class="sleep-mini-val">${s.duration}</div><div class="sleep-mini-label">Total</div></div>
      <div class="sleep-mini-item"><div class="sleep-mini-val">${s.score}</div><div class="sleep-mini-label">Score</div></div>
      <div class="sleep-mini-item"><div class="sleep-mini-val">${s.deep?.label||'—'}</div><div class="sleep-mini-label">Deep</div></div>
      <div class="sleep-mini-item"><div class="sleep-mini-val">${s.rem?.label||'—'}</div><div class="sleep-mini-label">REM</div></div>
    </div>`;
  }

  html += `</div></div>`;

  // Week averages
  const avgCal = avg(w7.map(d=>d.calories));
  const avgProt = avg(w7.map(d=>d.protein));
  const avgSleep = avg(w7.map(d=>d.sleep?.score||null));
  const wts = w7.filter(d=>d.weight);
  const wtTrend = wts.length>=2 ? (wts[wts.length-1].weight - wts[0].weight) : null;

  html += `
  <div class="section"><div class="section-label">Week Average (Last 7 Days)</div></div>
  <div class="today-card" style="margin:0 20px 16px">
    <div class="today-body">
      <div class="avg-row"><span class="avg-label">Calories</span><span class="avg-val">${avgCal?Math.round(avgCal)+' kcal':'—'}</span></div>
      <div class="avg-row"><span class="avg-label">Protein</span><span class="avg-val">${avgProt?Math.round(avgProt)+'g':'—'}</span></div>
      <div class="avg-row"><span class="avg-label">Sleep score</span><span class="avg-val">${avgSleep?Math.round(avgSleep):'—'}</span></div>
      <div class="avg-row"><span class="avg-label">Weight change</span><span class="avg-val">${wtTrend!=null?(wtTrend>=0?'+':'')+wtTrend.toFixed(1)+'kg':'—'}</span></div>
    </div>
  </div>`;

  // Charts — all 4 macros + combined
  const labels = days.map(shortLabel);

  html += `
  <div class="chart-section">
    <div class="chart-card">
      <div class="chart-title">🔥 Calories vs Target</div>
      <div class="chart-wrap"><canvas id="chartCal"></canvas></div>
    </div>
    <div class="chart-card">
      <div class="chart-title">💪 Protein vs Target</div>
      <div class="chart-wrap"><canvas id="chartProt"></canvas></div>
    </div>
    <div class="chart-card">
      <div class="chart-title">🌾 Carbs & Fat</div>
      <div class="chart-wrap"><canvas id="chartCF"></canvas></div>
    </div>
  </div>`;

  document.getElementById('tab-macros').innerHTML = html;

  // Build charts after DOM update
  requestAnimationFrame(() => {
    const calVals = days.map(d=>d.calories);
    const protVals = days.map(d=>d.protein);
    const carbVals = days.map(d=>d.carbs);
    const fatVals = days.map(d=>d.fat);

    // Calories
    makeLineChart('chartCal', labels, [
      {
        label: 'Calories',
        data: calVals,
        borderColor: '#38abe4', backgroundColor: 'rgba(56,171,228,0.08)',
        borderWidth: 2, pointRadius: 5, pointHoverRadius: 7,
        pointBackgroundColor: calVals.map(v=>dotColor(v,T.calories)),
        pointBorderColor: '#fff', pointBorderWidth: 2,
        tension: 0.3, fill: false, spanGaps: true
      },
      {
        label: 'Target',
        data: days.map(()=>T.calories),
        borderColor: 'rgba(56,171,228,0.35)', borderWidth: 1.5,
        borderDash: [5,5], pointRadius: 0, fill: false
      }
    ], { unit: ' kcal', yMin: Math.min(...calVals.filter(v=>v))*0.85 });

    // Protein
    makeLineChart('chartProt', labels, [
      {
        label: 'Protein',
        data: protVals,
        borderColor: '#22c55e', backgroundColor: 'rgba(34,197,94,0.08)',
        borderWidth: 2, pointRadius: 5, pointHoverRadius: 7,
        pointBackgroundColor: protVals.map(v=>dotColor(v,T.protein)),
        pointBorderColor: '#fff', pointBorderWidth: 2,
        tension: 0.3, fill: false, spanGaps: true
      },
      {
        label: 'Target',
        data: days.map(()=>T.protein),
        borderColor: 'rgba(34,197,94,0.35)', borderWidth: 1.5,
        borderDash: [5,5], pointRadius: 0, fill: false
      }
    ], { unit: 'g' });

    // Carbs + Fat combined
    makeLineChart('chartCF', labels, [
      {
        label: 'Carbs',
        data: carbVals,
        borderColor: '#f97316', borderWidth: 2,
        pointRadius: 4, pointHoverRadius: 6,
        pointBackgroundColor: carbVals.map(v=>dotColor(v,T.carbs)),
        pointBorderColor: '#fff', pointBorderWidth: 2,
        tension: 0.3, fill: false, spanGaps: true, yAxisID: 'y'
      },
      {
        label: 'Carbs target',
        data: days.map(()=>T.carbs),
        borderColor: 'rgba(249,115,22,0.3)', borderWidth: 1.5,
        borderDash: [5,5], pointRadius: 0, fill: false, yAxisID: 'y'
      },
      {
        label: 'Fat',
        data: fatVals,
        borderColor: '#a78bfa', borderWidth: 2,
        pointRadius: 4, pointHoverRadius: 6,
        pointBackgroundColor: fatVals.map(v=>dotColor(v,T.fat)),
        pointBorderColor: '#fff', pointBorderWidth: 2,
        tension: 0.3, fill: false, spanGaps: true, yAxisID: 'y2'
      },
      {
        label: 'Fat target',
        data: days.map(()=>T.fat),
        borderColor: 'rgba(167,139,250,0.3)', borderWidth: 1.5,
        borderDash: [5,5], pointRadius: 0, fill: false, yAxisID: 'y2'
      }
    ], { unit: 'g', y2: true, y2unit: 'g',
      yMin: 0, yMax: Math.max(...carbVals.filter(v=>v), T.carbs)*1.2,
      y2Min: 0, y2Max: Math.max(...fatVals.filter(v=>v), T.fat)*1.5
    });
  });
}

// ── TAB: SLEEP ────────────────────────────────────────────────────
function renderSleep() {
  const days = DATA.days;
  const T = DATA.targets;
  const labels = days.map(shortLabel);
  const sleepDays = days.filter(d=>d.sleep);

  let html = `
  <div class="chart-section">
    <div class="chart-card">
      <div class="chart-title">🌙 Sleep Duration & Score</div>
      <div class="chart-wrap"><canvas id="chartSleepDur"></canvas></div>
    </div>
    <div class="chart-card">
      <div class="chart-title">🔬 Sleep Stages Breakdown</div>
      <div class="chart-wrap" style="height:180px"><canvas id="chartSleepStages"></canvas></div>
    </div>
  </div>
  <div class="section"><div class="section-label">Sleep Log</div></div>
  <div class="chart-section"><div class="chart-card">`;

  sleepDays.slice().reverse().forEach(d => {
    const s = d.sleep;
    html += `<div class="avg-row">
      <div>
        <div style="font-size:12px;font-weight:600;color:var(--navy)">${d.label}</div>
        <div style="font-size:11px;color:rgba(26,58,82,0.5)">${s.bed} → ${s.wake} · Deep: ${s.deep?.label||'—'} · REM: ${s.rem?.label||'—'}</div>
      </div>
      <div style="text-align:right">
        <div style="font-family:var(--font-mono);font-size:14px;font-weight:700">${s.duration}</div>
        <span class="score-badge ${scoreClass(s.score)}">${s.score}</span>
      </div>
    </div>`;
  });

  html += `</div></div>`;
  document.getElementById('tab-sleep').innerHTML = html;

  requestAnimationFrame(() => {
    const durVals = days.map(d=>d.sleep?.hours||null);
    const scoreVals = days.map(d=>d.sleep?.score||null);

    // Duration + Score dual axis
    makeLineChart('chartSleepDur', labels, [
      {
        label: 'Hours',
        data: durVals,
        borderColor: '#7da4e8', backgroundColor: 'rgba(125,164,232,0.08)',
        borderWidth: 2, pointRadius: 5, pointHoverRadius: 7,
        pointBackgroundColor: durVals.map(v=>dotColor(v,T.sleep)),
        pointBorderColor: '#fff', pointBorderWidth: 2,
        tension: 0.3, fill: true, spanGaps: true, yAxisID: 'y'
      },
      {
        label: 'Target hrs',
        data: days.map(()=>T.sleep),
        borderColor: 'rgba(125,164,232,0.35)', borderWidth: 1.5,
        borderDash: [5,5], pointRadius: 0, fill: false, yAxisID: 'y'
      },
      {
        label: 'Score',
        data: scoreVals,
        borderColor: '#f97316', borderWidth: 2,
        pointRadius: 4, pointHoverRadius: 6,
        pointBackgroundColor: scoreVals.map(v=>v>=85?'#22c55e':v>=75?'#f97316':'#ef4444'),
        pointBorderColor: '#fff', pointBorderWidth: 2,
        tension: 0.3, fill: false, spanGaps: true, yAxisID: 'y2'
      }
    ], {
      y: true, y2: true,
      yMin: 0, yMax: 12, unit: 'h',
      y2Min: 50, y2Max: 100, y2unit: ''
    });

    // Sleep stages stacked bar
    const stageDays = days.filter(d=>d.sleep);
    const stageLabels = stageDays.map(shortLabel);
    destroyChart('chartSleepStages');
    const ctx2 = document.getElementById('chartSleepStages')?.getContext('2d');
    if(ctx2) {
      charts['chartSleepStages'] = new Chart(ctx2, {
        type: 'bar',
        data: {
          labels: stageLabels,
          datasets: [
            {
              label: 'Deep',
              data: stageDays.map(d=>+(d.sleep?.deep?.hours||0).toFixed(2)),
              backgroundColor: '#1e3a5f', borderRadius: 2
            },
            {
              label: 'REM',
              data: stageDays.map(d=>+(d.sleep?.rem?.hours||0).toFixed(2)),
              backgroundColor: '#7da4e8', borderRadius: 2
            },
            {
              label: 'Light',
              data: stageDays.map(d=>+(d.sleep?.light?.hours||0).toFixed(2)),
              backgroundColor: '#c9eeff', borderRadius: 2
            },
            {
              label: 'Awake',
              data: stageDays.map(d=>+(d.sleep?.awake?.hours||0).toFixed(2)),
              backgroundColor: 'rgba(239,68,68,0.4)', borderRadius: 2
            }
          ]
        },
        options: {
          responsive: true, maintainAspectRatio: false,
          plugins: {
            legend: { position: 'top', labels: { boxWidth: 10, padding: 8, font: { size: 10 } } },
            tooltip: { callbacks: { label: ctx => ` ${ctx.dataset.label}: ${ctx.parsed.y}h` } }
          },
          scales: {
            x: { stacked: true, grid: { display: false }, ticks: { font: { size: 9 }, maxRotation: 0, maxTicksLimit: 7 } },
            y: { stacked: true, grid: { color: 'rgba(56,171,228,0.08)' }, ticks: { font: { size: 9 }, callback: v=>v+'h' } }
          }
        }
      });
    }
  });
}

// ── TAB: WEIGHT ───────────────────────────────────────────────────
function renderWeight() {
  const days = DATA.days;
  const startW = DATA.meta?.startWeight || 59;
  const weightDays = days.filter(d=>d.weight);
  const allWeights = weightDays.map(d=>d.weight);
  const minW = Math.min(...allWeights, startW) - 0.3;
  const maxW = Math.max(...allWeights, startW) + 0.3;
  const labels = days.map(shortLabel);
  const wtVals = days.map(d=>d.weight||null);

  const curr = weightDays.length ? weightDays[weightDays.length-1].weight : startW;
  const change = curr - startW;

  let html = `
  <div class="macros-row" style="grid-template-columns:1fr 1fr;gap:10px">
    <div class="macro-card" style="padding:16px 12px">
      <div class="macro-val" style="font-size:22px">${curr}kg</div>
      <div class="macro-label">Current</div>
    </div>
    <div class="macro-card" style="padding:16px 12px">
      <div class="macro-val" style="font-size:22px;color:${change>=0?'#22c55e':'#ef4444'}">${change>=0?'+':''}${change.toFixed(1)}kg</div>
      <div class="macro-label">Since start</div>
    </div>
  </div>
  <div class="chart-section">
    <div class="chart-card">
      <div class="chart-title">⚖️ Weight — Zoomed In</div>
      <div class="chart-wrap" style="height:180px"><canvas id="chartWeight"></canvas></div>
    </div>
  </div>
  <div class="section"><div class="section-label">Weight Log</div></div>
  <div class="chart-section"><div class="chart-card">`;

  weightDays.slice().reverse().forEach((d,i,arr) => {
    const prev = arr[i+1];
    const diff = prev ? (d.weight - prev.weight) : null;
    html += `<div class="avg-row">
      <div>
        <div style="font-size:12px;font-weight:600;color:var(--navy)">${d.label}</div>
        <div style="font-size:11px;color:rgba(26,58,82,0.5)">${d.workout||''}</div>
      </div>
      <div style="text-align:right">
        <div style="font-family:var(--font-mono);font-size:14px;font-weight:700">${d.weight} kg</div>
        ${diff!=null?`<div style="font-size:11px;color:${diff>=0?'#22c55e':'#ef4444'}">${diff>=0?'+':''}${diff.toFixed(1)}kg</div>`:'<div style="font-size:11px;color:rgba(26,58,82,0.3)">start</div>'}
      </div>
    </div>`;
  });

  html += `</div></div>`;
  document.getElementById('tab-weight').innerHTML = html;

  requestAnimationFrame(() => {
    makeLineChart('chartWeight', labels, [
      {
        label: 'Weight',
        data: wtVals,
        borderColor: '#22c55e', backgroundColor: 'rgba(34,197,94,0.08)',
        borderWidth: 2.5, pointRadius: 5, pointHoverRadius: 8,
        pointBackgroundColor: '#22c55e',
        pointBorderColor: '#fff', pointBorderWidth: 2,
        tension: 0.3, fill: true, spanGaps: true
      },
      {
        label: 'Start',
        data: days.map(()=>startW),
        borderColor: 'rgba(26,58,82,0.2)', borderWidth: 1.5,
        borderDash: [4,4], pointRadius: 0, fill: false
      }
    ], { unit: 'kg', yMin: minW, yMax: maxW });
  });
}

// ── TAB: LOG ──────────────────────────────────────────────────────
function renderLog() {
  const days = DATA.days;
  const T = DATA.targets;

  let html = `<div class="section" style="padding-bottom:12px">
    <div class="section-label">All ${days.length} Days</div>`;

  days.slice().reverse().forEach(d => {
    const isNull = d.calories===null;
    html += `<div class="log-item">
      <div class="log-item-header">
        <div>
          <div style="font-family:var(--font-mono);font-size:11px;font-weight:700;color:var(--sky)">DAY ${d.day} · ${d.label}</div>
          <div style="font-size:12px;color:var(--navy);font-weight:600;margin-top:2px">${d.workout||'—'}</div>
        </div>
        <div style="text-align:right">
          ${d.weight?`<div style="font-family:var(--font-mono);font-size:14px;font-weight:700;color:var(--navy)">${d.weight}kg</div>`:''}
          ${d.sleep?`<span class="score-badge ${scoreClass(d.sleep.score)}">${d.sleep.score}</span>`:''}
        </div>
      </div>
      ${isNull
        ? `<div class="in-progress">⏳ In progress</div>`
        : `<div class="log-macro-grid">
          ${[{l:'Cal',v:d.calories,t:T.calories},{l:'Prot',v:d.protein+'g',t:T.protein},{l:'Carbs',v:d.carbs+'g',t:T.carbs},{l:'Fat',v:d.fat+'g',t:T.fat}]
            .map(m=>`<div class="log-macro">
              <div class="log-macro-val" style="color:${dotColor(typeof m.v==='number'?m.v:parseFloat(m.v),m.t)}">${m.v}</div>
              <div class="log-macro-label">${m.l}</div>
            </div>`).join('')}
        </div>`
      }
      ${d.sleep?`<div style="margin-top:8px;padding-top:8px;border-top:1px solid rgba(56,171,228,0.08);font-size:11px;color:rgba(26,58,82,0.5)">
        😴 ${d.sleep.duration} · Score ${d.sleep.score} · Deep ${d.sleep.deep?.label||'—'} · REM ${d.sleep.rem?.label||'—'}
      </div>`:''}
    </div>`;
  });

  html += `</div>`;
  document.getElementById('tab-log').innerHTML = html;
}

// ── TABS ──────────────────────────────────────────────────────────
const TABS = { macros:renderMacros, sleep:renderSleep, weight:renderWeight, log:renderLog };
let rendered = new Set();

function showTab(name, btn) {
  document.querySelectorAll('.tab').forEach(t=>t.classList.remove('active'));
  btn.classList.add('active');
  ['macros','sleep','weight','log'].forEach(t=>{
    document.getElementById('tab-'+t).style.display = t===name?'block':'none';
  });
  if(!rendered.has(name) && DATA) { TABS[name](); rendered.add(name); }
}

function render() {
  renderMacros(); rendered.add('macros');
  const T = DATA.targets;
  document.getElementById('footer').textContent =
    `ROHIT · Lean Bulk · ${T.calories} kcal · ${T.protein}g P · ${T.carbs}g C · ${T.fat}g F`;
}

loadData();
</script>
</body>
</html>
