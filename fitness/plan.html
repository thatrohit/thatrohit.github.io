<style>
/* ── MEAL PLAN ── */
.meal-card {
  background: var(--glass); backdrop-filter: blur(16px);
  border-radius: var(--r-xl); padding: 16px 18px;
  margin-bottom: 12px;
  border: 1px solid var(--glass-border);
  box-shadow: var(--shadow-sm);
}
.meal-card.highlight { border-left: 3px solid var(--sky); }
.meal-card.bedtime   { border-left: 3px solid var(--rest); }
.meal-time {
  display: flex; align-items: baseline; gap: 8px;
  margin-bottom: 12px; flex-wrap: wrap;
}
.meal-label {
  font-family: var(--font-mono); font-size: 13px; font-weight: 700;
  color: var(--sky); text-transform: uppercase; letter-spacing: 1px;
}
.meal-clock { font-size: 11px; color: rgba(26,58,82,0.5); }
.meal-kcal  { font-size: 11px; color: rgba(26,58,82,0.4); margin-left: auto; }
.meal-items { display: flex; flex-direction: column; gap: 8px; }
.meal-item {
  display: flex; justify-content: space-between; align-items: flex-start; gap: 8px;
  padding: 8px 0; border-bottom: 1px solid rgba(56,171,228,0.08);
}
.meal-item:last-child { border-bottom: none; padding-bottom: 0; }
.meal-name { font-size: 13px; color: var(--navy); font-weight: 500; flex: 1; }
.meal-macro {
  font-family: var(--font-mono); font-size: 11px; color: var(--sky);
  text-align: right; white-space: nowrap;
}
.meal-note { font-size: 11px; color: var(--push); font-style: italic; border-bottom: none !important; }

/* ── WORKOUT SPLIT ── */
.day-card {
  background: var(--glass); backdrop-filter: blur(10px);
  border-radius: var(--r-lg); margin-bottom: 8px;
  border: 1px solid var(--glass-border);
  overflow: hidden;
}
.day-header {
  padding: 14px 16px; display: flex; align-items: center;
  gap: 12px; cursor: pointer;
}
.day-tag {
  font-family: var(--font-mono); font-size: 12px; font-weight: 700;
  width: 36px; text-align: center;
}
.day-name { font-size: 14px; font-weight: 600; color: var(--navy); flex: 1; }
.day-chevron { font-size: 12px; color: rgba(26,58,82,0.3); transition: transform 0.2s; }
.day-card.open .day-chevron { transform: rotate(90deg); }
.day-exercises { display: none; padding: 0 16px 14px; }
.day-card.open .day-exercises { display: block; }
.ex-table { width: 100%; border-collapse: collapse; font-size: 12px; }
.ex-table th {
  font-family: var(--font-mono); font-size: 10px; text-transform: uppercase;
  letter-spacing: 0.5px; color: var(--sky); padding: 6px 8px;
  border-bottom: 1px solid rgba(56,171,228,0.15); text-align: left;
}
.ex-table td {
  padding: 8px 8px; color: var(--navy);
  border-bottom: 1px solid rgba(56,171,228,0.06);
}
.ex-table tr:last-child td { border-bottom: none; }

/* ── PRINCIPLES ── */
.principle-card {
  display: flex; gap: 12px; align-items: flex-start;
  background: var(--glass); backdrop-filter: blur(10px);
  border-radius: var(--r-lg); padding: 14px 16px;
  border: 1px solid var(--glass-border); margin-bottom: 8px;
}
.principle-icon { font-size: 20px; flex-shrink: 0; }
.principle-text { font-size: 13px; color: var(--navy); line-height: 1.5; }
.principle-text strong { font-weight: 700; }

/* ── SUPPLEMENT TIMELINE ── */
.timeline-item {
  display: flex; gap: 14px; align-items: flex-start;
  padding: 14px 0; border-bottom: 1px solid rgba(56,171,228,0.08);
}
.timeline-item:last-child { border-bottom: none; }
.timeline-time {
  font-family: var(--font-mono); font-size: 11px; font-weight: 700;
  color: var(--sky); min-width: 60px; padding-top: 2px;
}
.timeline-content { flex: 1; }
.timeline-title { font-size: 13px; font-weight: 600; color: var(--navy); margin-bottom: 3px; }
.timeline-desc { font-size: 12px; color: rgba(26,58,82,0.55); line-height: 1.4; }
.timeline-tags { display: flex; gap: 4px; flex-wrap: wrap; margin-top: 6px; }
.timeline-tag {
  font-family: var(--font-mono); font-size: 10px; font-weight: 700;
  padding: 2px 8px; border-radius: 10px;
  background: rgba(56,171,228,0.1); color: var(--sky);
}

/* ── MACROS SUMMARY ── */
.macros-summary {
  display: grid; grid-template-columns: repeat(4,1fr);
  gap: 8px; margin-bottom: 16px;
}
.ms-card {
  background: var(--glass); backdrop-filter: blur(10px);
  border-radius: var(--r-md); padding: 12px 8px;
  border: 1px solid var(--glass-border); text-align: center;
}
.ms-val { font-family: var(--font-mono); font-size: 18px; font-weight: 700; color: var(--sky); }
.ms-label { font-size: 10px; color: rgba(26,58,82,0.5); margin-top: 2px; }
</style>
</head>

// ── RENDER FUNCTIONS ───────────────────────────────────────────────

function renderDiet() {
  const T = PLAN_DATA.targets;
  let html = `
  <div class="section" style="padding-bottom:12px">
    <div class="section-label">Indian Meal Plan · ~2,330 kcal</div>
    <div class="macros-summary">
      <div class="ms-card"><div class="ms-val">${T.calories}</div><div class="ms-label">kcal</div></div>
      <div class="ms-card"><div class="ms-val">${T.protein}g</div><div class="ms-label">protein</div></div>
      <div class="ms-card"><div class="ms-val">${T.carbs}g</div><div class="ms-label">carbs</div></div>
      <div class="ms-card"><div class="ms-val">${T.fat}g</div><div class="ms-label">fat</div></div>
    </div>
  </div>
  <div class="section">`;

  PLAN_DATA.meals.forEach(m => {
    html += `<div class="meal-card${m.highlight?' highlight':''}${m.bedtime?' bedtime':''}">
      <div class="meal-time">
        <span class="meal-label">${m.label}</span>
        <span class="meal-clock">${m.clock}</span>
        ${m.kcal?`<span class="meal-kcal">${m.kcal}</span>`:''}
      </div>
      <div class="meal-items">
        ${m.items.map(item => `<div class="meal-item${item.note?' meal-note':''}">
          <span class="meal-name">${item.name}</span>
          ${item.macro&&!item.note?`<span class="meal-macro">${item.macro}</span>`:''}
        </div>`).join('')}
      </div>
    </div>`;
  });

  html += `</div>`;
  document.getElementById('tab-diet').innerHTML = html;
}

function renderWorkout() {
  let html = `<div class="section" style="padding-bottom:12px">
    <div class="section-label">PPL × 2 Split · Mon–Sat</div>`;

  PLAN_DATA.workout.forEach(day => {
    const badgeClass = {push:'badge-push',pull:'badge-pull',legs:'badge-legs',rest:'badge-rest'}[day.type]||'badge-pull';
    html += `<div class="day-card" onclick="toggleDay(this)">
      <div class="day-header">
        <span class="day-tag badge ${badgeClass}">${day.day}</span>
        <span class="day-name">${day.label}</span>
        ${day.exercises.length?`<span class="day-chevron">›</span>`:''}
      </div>`;

    if(day.exercises.length) {
      html += `<div class="day-exercises">
        <table class="ex-table">
          <thead><tr><th>Exercise</th><th>Sets</th><th>Reps</th><th>Focus</th></tr></thead>
          <tbody>
            ${day.exercises.map(e=>`<tr><td>${e.name}</td><td>${e.sets}</td><td>${e.reps}</td><td>${e.focus}</td></tr>`).join('')}
          </tbody>
        </table>
      </div>`;
    }
    html += `</div>`;
  });

  html += `
  <div style="padding:16px 0 0">
    <div class="section-label">Training Notes</div>
  </div>
  ${[
    'Train 9–10 AM fasted. Coffee with 40ml milk at 7 AM is all you need.',
    'Progressive overload — add weight or reps every session. Track your lifts.',
    'Rest 2–3 min between compounds. 60–90 sec for isolations.',
    'Train to 1–2 reps short of failure on isolations. 2–3 reps short on compounds.',
    'Pull-ups daily — full working sets Tue & Sat. Sub-maximal Mon, Wed, Fri.',
  ].map(n=>`<div class="principle-card" style="margin-bottom:8px"><div class="principle-text">${n}</div></div>`).join('')}
  </div>`;

  document.getElementById('tab-workout').innerHTML = html;
}

function renderRoutine() {
  let html = `<div class="section" style="padding-bottom:12px">
    <div class="section-label">Daily Schedule</div>
    <div class="meal-card">
      <div class="meal-items">`;

  PLAN_DATA.routine.forEach(r => {
    html += `<div class="timeline-item">
      <div class="timeline-time">${r.time}</div>
      <div class="timeline-content">
        <div class="timeline-title">${r.title}</div>
        <div class="timeline-desc">${r.desc}</div>
        ${r.tags.length?`<div class="timeline-tags">${r.tags.map(t=>`<span class="timeline-tag">${t}</span>`).join('')}</div>`:''}
      </div>
    </div>`;
  });

  html += `</div></div></div>`;
  document.getElementById('tab-routine').innerHTML = html;
}

function renderPrinciples() {
  let html = `<div class="section" style="padding-bottom:12px">
    <div class="section-label">Key Principles</div>
    ${PLAN_DATA.principles.map(p=>`
    <div class="principle-card">
      <div class="principle-icon">${p.icon}</div>
      <div class="principle-text">${p.text}</div>
    </div>`).join('')}
  </div>`;

  document.getElementById('tab-principles').innerHTML = html;
}

// ── TABS ──────────────────────────────────────────────────────────
const TABS = { diet:renderDiet, workout:renderWorkout, routine:renderRoutine, principles:renderPrinciples };
let rendered = new Set();

function showTab(name, btn) {
  document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
  btn.classList.add('active');
  ['diet','workout','routine','principles'].forEach(t => {
    document.getElementById('tab-'+t).style.display = t===name?'block':'none';
  });
  if(!rendered.has(name)) { TABS[name](); rendered.add(name); }
}

function toggleDay(el) {
  if(!el.querySelector('.day-exercises')) return;
  el.classList.toggle('open');
}

// Init
renderDiet();
rendered.add('diet');
</script>
</body>
</html>
